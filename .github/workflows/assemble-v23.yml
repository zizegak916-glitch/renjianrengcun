name: Assemble v23 full outline

on:
  push:
    branches:
      - main
    paths:
      - artifacts/v23.0/**
      - .github/workflows/assemble-v23.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild full Markdown
        shell: bash
        run: |
          set -euo pipefail
          cat artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part01 \
              artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part02 \
              artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part03a \
              artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part03b \
              artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part03c \
              artifacts/v23.0/人间仍存_v23.0.md.gz.b64.part04 \
              | base64 --decode \
              | gzip --decompress --stdout \
              > 人间仍存_第一卷全量重写大纲_v23.0_251章番茄男频章名重制版.md

          echo "00f0c33b1959b8734e3920d2b0b003d6017223c91f99a8bdf9776de36d9f84a6  人间仍存_第一卷全量重写大纲_v23.0_251章番茄男频章名重制版.md" | sha256sum --check

      - name: Commit full Markdown
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 人间仍存_第一卷全量重写大纲_v23.0_251章番茄男频章名重制版.md
          if git diff --cached --quiet; then
            echo "Full Markdown already exists and is unchanged."
            exit 0
          fi
          git commit -m "添加 v23.0 全量单文件大纲"
          git push origin HEAD:main
